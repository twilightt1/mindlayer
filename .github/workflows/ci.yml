name: CI

on:
  push:
  pull_request:

jobs:
  test:
    name: Lint and infra-free tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt -r requirements-dev.txt

      - name: Run targeted lint
        run: |
          python -m ruff check \
            app/main.py \
            app/agents \
            app/services/health_service.py \
            app/storage.py \
            app/tasks/ingestion_tasks.py \
            app/retrieval/vector_retriever.py \
            app/api/v1/chat.py \
            app/api/v1/sse.py \
            eval/run_eval.py \
            eval/metrics.py \
            eval/reporting.py \
            tests/api/test_health_api.py \
            tests/api/test_sse.py \
            tests/api/test_chat_streaming.py \
            tests/rag/test_graph_routing.py \
            tests/rag/test_evaluation.py \
            tests/rag/test_integration.py \
            tests/services/test_health_service.py \
            tests/eval/test_eval_metrics.py

      - name: Run API tests
        run: python -m pytest --confcutdir=tests/api tests/api/test_health_api.py tests/api/test_sse.py tests/api/test_chat_streaming.py -q

      - name: Run service tests
        run: python -m pytest --confcutdir=tests/services tests/services/test_health_service.py -q

      - name: Run RAG tests
        run: |
          python -m pytest --confcutdir=tests/rag \
            tests/rag/test_graph_routing.py \
            tests/rag/test_evaluation.py \
            tests/rag/test_integration.py \
            -q

      - name: Run evaluation metric tests
        run: python -m pytest --confcutdir=tests/eval tests/eval/test_eval_metrics.py -q

      - name: Run evaluation smoke
        run: python eval/run_eval.py --output-dir eval/results --top-k 5

      - name: Validate Docker Compose config
        run: docker compose config --quiet
