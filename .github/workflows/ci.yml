name: CI

on:
  push:
  pull_request:

jobs:
  test:
    name: Lint and infra-free tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt -r requirements-dev.txt

      - name: Run targeted lint
        run: |
          python -m ruff check \
            app/main.py \
            app/config.py \
            app/agents \
            app/services/health_service.py \
            app/services/diagnostics_service.py \
            app/storage.py \
            app/tasks/ingestion_tasks.py \
            app/retrieval \
            app/api/v1/chat.py \
            app/api/v1/sse.py \
            app/api/v1/admin.py \
            eval/run_eval.py \
            eval/live_api_eval.py \
            eval/metrics.py \
            eval/reporting.py \
            tests/api/test_health_api.py \
            tests/api/test_sse.py \
            tests/api/test_chat_streaming.py \
            tests/api/test_admin_diagnostics.py \
            tests/api/conftest.py \
            tests/rag/test_graph_routing.py \
            tests/rag/test_evaluation.py \
            tests/rag/test_integration.py \
            tests/rag/test_ai_hardening.py \
            tests/rag/conftest.py \
            tests/services/test_health_service.py \
            tests/services/test_diagnostics_service.py \
            tests/services/conftest.py \
            tests/eval/test_eval_metrics.py \
            tests/eval/test_live_api_eval.py \
            tests/config/test_settings_validation.py \
            tests/integration

      - name: Run API tests
        run: python -m pytest --confcutdir=tests/api tests/api/test_health_api.py tests/api/test_sse.py tests/api/test_chat_streaming.py tests/api/test_admin_diagnostics.py -q

      - name: Run service tests
        run: python -m pytest --confcutdir=tests/services tests/services/test_health_service.py tests/services/test_diagnostics_service.py -q

      - name: Run RAG tests
        run: |
          python -m pytest --confcutdir=tests/rag \
            tests/rag/test_graph_routing.py \
            tests/rag/test_evaluation.py \
            tests/rag/test_integration.py \
            tests/rag/test_ai_hardening.py \
            -q

      - name: Run evaluation tests
        run: python -m pytest --confcutdir=tests/eval tests/eval/test_eval_metrics.py tests/eval/test_live_api_eval.py -q

      - name: Run config tests
        run: python -m pytest --confcutdir=tests/config tests/config/test_settings_validation.py -q

      - name: Run evaluation smoke
        run: python eval/run_eval.py --mode offline --output-dir eval/results --top-k 5

      - name: Prepare Docker Compose env
        run: cp .env.test.example .env

      - name: Validate Docker Compose config
        run: docker compose config --quiet

      - name: Validate production Docker Compose config
        run: docker compose -f docker-compose.yml -f docker-compose.prod.yml config --quiet

  lint-full:
    name: Full-repo ruff
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-dev.txt

      - name: Run full-repo ruff
        run: python -m ruff check app tests eval scripts

  security-check:
    name: Security readiness gate
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt -r requirements-dev.txt

      - name: Run security_check.py
        run: python scripts/security_check.py

  integration:
    name: Live service integration tests
    runs-on: ubuntu-latest

    env:
      RUN_LIVE_INTEGRATION: "1"
      DATABASE_URL: postgresql+asyncpg://postgres:password@localhost:55432/ragdb
      POSTGRES_PORT: "55432"
      DATABASE_POOL_SIZE: "5"
      DATABASE_MAX_OVERFLOW: "5"
      REDIS_URL: redis://localhost:6379/0
      REDIS_POOL_MAX: "10"
      JWT_SECRET_KEY: test-secret-key-change-in-production
      MINIO_ENDPOINT: localhost:9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
      MINIO_BUCKET: rag-docs
      MINIO_SECURE: "false"
      CHROMA_HOST: localhost
      CHROMA_PORT: "8001"
      OPENROUTER_API_KEY: test-openrouter-key
      OPENROUTER_BASE_URL: https://openrouter.ai/api/v1
      LLM_MODEL: openai/gpt-4o-mini
      LLM_TEMPERATURE: "0.3"
      LLM_MAX_TOKENS: "512"
      OPENAI_API_KEY: test-openai-key
      EMBED_MODEL: text-embedding-3-small
      EMBED_DIMENSIONS: "1536"
      EMBED_BATCH_SIZE: "64"
      JINA_API_KEY: test-jina-key
      JINA_RERANKER_MODEL: jina-reranker-v2-base-multilingual
      JINA_RERANKER_TOP_N: "5"
      EVALUATOR_FAILURE_MODE: warn_only
      CELERY_BROKER_URL: redis://localhost:6379/1
      CELERY_RESULT_BACKEND: redis://localhost:6379/2
      RATE_LIMIT_PER_MINUTE: "600"
      RATE_LIMIT_PER_DAY: "10000"
      FRONTEND_URL: http://localhost:5173
      ALLOWED_ORIGINS: http://localhost:5173,http://localhost:3000
      ENVIRONMENT: test
      LOG_LEVEL: INFO

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt -r requirements-dev.txt

      - name: Prepare Docker Compose env
        run: cp .env.test.example .env

      - name: Start live services
        run: docker compose up -d postgres redis chromadb minio

      - name: Wait for live services
        shell: bash
        run: |
          set -euo pipefail
          for i in {1..60}; do
            docker compose exec -T postgres pg_isready -U postgres -d ragdb \
              && docker compose exec -T redis redis-cli ping \
              && curl -fsS http://localhost:8001/api/v2/heartbeat >/dev/null \
              && curl -fsS http://localhost:9000/minio/health/live >/dev/null \
              && exit 0
            sleep 2
          done
          docker compose ps
          docker compose logs postgres redis chromadb minio
          exit 1

      - name: Run live integration tests
        run: python -m pytest --confcutdir=tests/integration tests/integration -q

      - name: Stop live services
        if: always()
        run: docker compose down -v
