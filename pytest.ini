[pytest]
asyncio_mode = auto
markers =
    unit: tests that do not require external infrastructure
    service: service-layer tests that mock external dependencies
    rag: RAG and agent graph tests that are safe for local/CI execution
    api: API tests that avoid external infrastructure through mocks
    integration: integration tests that exercise multiple subsystems
    requires_infra: tests that require Postgres, Redis, ChromaDB, MinIO, or other live services
